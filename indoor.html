<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>変電所イベント Webマップ（即確認版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; font-family: "Segoe UI", sans-serif; }
  #map { height: 100vh; }

  .header {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

.leaflet-popup-content .popup-title {
    font-weight: bold;
    font-size: 30px;
    margin-bottom: 6px;
  }

  /* スマホ操作を意識 */
  .leaflet-control-layers {
    font-size: 14px;
  }

</style>
</head>

<style>
.nav-links {
  position: fixed;
  bottom: 12px;
  left: 12px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-links a {
  display: inline-block;
  padding: 10px 14px;
  background: #1d6fdc;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
}

.nav-links a.secondary {
  background: #555;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="nav-links">
  <a href="index.html">👀 屋外実演ブースＭＡＰ</a>
  <a href="booth_detail.html" class="secondary">💡 展示ブース一覧</a>
</div>

<script>
/* =========================================
   1. マップ初期化（構内ローカル座標）
========================================= */
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2
});

/* =========================================
   2. 屋内展示図「イメージ」背景
   ※本番では imageOverlay を実図PNGに差替
========================================= */
const bounds = [[0,0],[800,1500]];
map.fitBounds(bounds);

/* SVGで簡易構内図イメージを生成（即見れる用） */
L.imageOverlay(
  "indoor_map.png",
  bounds
).addTo(map);

/* =========================================
   3. レイヤ定義
========================================= */
const indoorLayer  = L.layerGroup();
const routeLayerA  = L.layerGroup();


/* =========================================
   4. GeoJSON相当データ（HTML内埋め込み）
========================================= */
const indoorBooths = {  "type": "FeatureCollection","features": [
    { "type":"Feature","properties":{"id":"I-01","name":"技術PRコーナー","time":"5〜10分","image":"I-X.png"},  "geometry":{"type":"Point","coordinates":[300,380]}},

    { "type":"Feature","properties":{"id":"I-02","name":"地域別電力需要予測システム（DFES）","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[260,460]}},

    { "type":"Feature","properties":{"id":"I-03","name":"AIを活用した配電設備の劣化判定","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[340,460]}},

    { "type":"Feature","properties":{"id":"I-04","name":"ポリエチレン線カバーの水平リサイクル","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[420,460]}},

    { "type":"Feature","properties":{"id":"I-05","name":"柱上変圧器の絶縁油リサイクル","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[500,460]}},

    { "type":"Feature","properties":{"id":"I-06","name":"植物油変圧器の紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[580,460]}},

    { "type":"Feature","properties":{"id":"I-07","name":"蓄電池を活用した水力マイクログリッド系統の安定化を実現","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[410,300]}},

    { "type":"Feature","properties":{"id":"I-08","name":"地中ケーブル用FRP製支持材 実機展示","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[510,300]}},

    { "type":"Feature","properties":{"id":"I-09","name":"鉄塔用ボルト緩み止め金具　スマートスプリング","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[580,300]}},

    { "type":"Feature","properties":{"id":"I-10A","name":"状態監視保全システムによる変電設備のセンシング","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[690,460]}},

    { "type":"Feature","properties":{"id":"I-10B","name":"状態監視保全システムによる変電設備のセンシング","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[690,300]}},

    { "type":"Feature","properties":{"id":"I-11","name":"変電機器の保守技術紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[820,440]}},

    { "type":"Feature","properties":{"id":"I-12","name":"エンジニアリング支援ツール紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[960,440]}},

    { "type":"Feature","properties":{"id":"I-13","name":"カーボンニュートラルの実現に向けた変電設備","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[820,300]}},


    { "type":"Feature","properties":{"id":"I-14","name":"地中線埋設立ち合いの紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[930,300]}},

    { "type":"Feature","properties":{"id":"I-15","name":"歩行用アシストスーツの歩行体験","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1050,300]}},

    { "type":"Feature","properties":{"id":"I-16","name":"ドローンシミュレータの訓練体験","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1120,300]}},

    { "type":"Feature","properties":{"id":"I-17","name":"ドローン伐採機の開発紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1190,300]}},

    { "type":"Feature","properties":{"id":"I-18","name":"自動昇木機能付き芯止め機の実機展示","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1290,300]}},

    { "type":"Feature","properties":{"id":"I-19","name":"コンサルティングサービス＆Conote　サービス紹介","time":"5〜10分","image":"I-X.png"},

      "geometry":{"type":"Point","coordinates":[1290,520]}},

    { "type":"Feature","properties":{"id":"I-20","name":"海外コンサル事例紹介","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1200,540]}},

    { "type":"Feature","properties":{"id":"I-21","name":"【企画室特別展示】GAxIAプラットフォームサービス（3D Gaussian Splatting）","time":"5〜10分","image":"I-X.png"},
      "geometry":{"type":"Point","coordinates":[1110,520]}},

  ]
};


/* =========================================
   5. 描画処理
========================================= */

function popupBase(p) {
  let html = `
    <div style="
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    ">
      ${p.id} ${p.name}
    </div>
    見学目安：${p.time}
  `;

  // 画像がある場合のみ表示
  if (p.image) {
    html += `
      <img src="${p.image}"
           style="width:100%; margin-top:6px; border-radius:6px;">`;
  }
  return html;
}

L.geoJSON(indoorBooths,{
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;">💡</span>',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      })
    }),
  onEachFeature: (f, l) =>
    l.bindPopup(popupBase(f.properties))
}).addTo(indoorLayer);



/* =========================================
   見学ルート C（東側＆屋外）
========================================= */
L.polyline(
  [
    [380,100],
    [380,1480],
    [750,1480],
    [750,120]   // ← 終点
  ],
  {
    color:"pink",
    weight:3,
    dashArray:"6,6"
  }
).addTo(routeLayerA);

/* 始点のマーク */
L.marker([390,80], {
  icon: L.divIcon({
 　 html: '<span style="font-size:25px; color:#000000; font-weight:bold;">🚶</span>',
    iconSize: [30, 30],
    className: ""
  })
}).addTo(routeLayerA);

/* 終点のマーク */
L.marker([750,100], {
  icon: L.divIcon({
    html: '<span style="font-size:20px; color:#000000; font-weight:bold;">🚩</span>',
    iconSize: [30, 30],
    className: ""
  })
}).addTo(routeLayerA);
``

/* =========================================
   6. レイヤ切替（QR前提）
========================================= */
L.control.layers(
  null,
  {
    "💡 屋内展示ブース": indoorLayer,
    "🚶→🚩 見学ルート C（西側＆屋内エリア）": routeLayerA
  },
  { collapsed: false }
).addTo(map);

/* 初期表示 */
indoorLayer.addTo(map);
</script>

</body>
</html>
