<html lang="ja">
<head>

<!-- Leaflet CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; font-family: "Segoe UI", sans-serif; }
  html, body {
  height: 100%;
}

#map {
  height: 100svh; /* ★ iOS / Android / WebView 最優先 */
  height: 100dvh;   /* モダンブラウザ（iOS 16+, Android, Chrome） */
  height: 100vh;    /* フォールバック（古いブラウザ） */
}
  .header {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

.leaflet-popup-content .popup-title {
    font-weight: bold;
    font-size: 30px;
    margin-bottom: 6px;
  }

  /* スマホ操作を意識 */
  .leaflet-control-layers {
    font-size: 14px;
  }

.nav-links {
  position: fixed;
  bottom: 12px;
  left: 12px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-links a {
  display: inline-block;
  padding: 10px 14px;
  background: #1d6fdc;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
}

.nav-links a.secondary {
  background: #555;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="nav-links">

   1. マップ初期化（構内ローカル座標）
========================================= */
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2
});


function fixMapSize() {
  map.invalidateSize();
}

setTimeout(fixMapSize, 0);
setTimeout(fixMapSize, 300);
setTimeout(fixMapSize, 800);

window.addEventListener("orientationchange", () => {
  setTimeout(fixMapSize, 300);
});


/* =========================================
   2. 構内図「イメージ」背景
   ※本番では imageOverlay を実図PNGに差替
========================================= */
const bounds = [[0,0],[1000,1500]];
map.fitBounds(bounds);

/* SVGで簡易構内図イメージを生成（即見れる用） */
L.imageOverlay(
  "./substation_map.png",
  bounds
).addTo(map);

/* =========================================
   3. レイヤ定義
========================================= */

const indoorLayer  = L.layerGroup();
const routeLayerA  = L.layerGroup();
const routeLayerB  = L.layerGroup();
const routeLayerC  = L.layerGroup();

========================================= */

const indoorBooths = {  "type": "FeatureCollection",
  "features": [
    {
      "type": "Feature",
      "properties": {
        "id": "I-01～21",
        "name": "屋内展示ブース",
        "time": "30分",
        "detailUrl": "indoor.html"
      },
      "geometry": {
        "type": "Point",
        "coordinates": [0, 0]
      }
    }
  ]
};



/* =========================================
   5. 描画処理
========================================= */

function popupBase(p) {
  let html = `
    <div style="
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    ">
      ${p.id} ${p.name}
    </div>
    概要：${p.detail}
  `;

  // 画像がある場合のみ表示
  if (p.image) {
    html += `
      <img src="${p.image}"
           style="width:100%; margin-top:6px; border-radius:6px;">`;
  }

  // 屋内展示ブース用：詳細ページへのボタン
  if (p.detailUrl) {
    html += `
      <div style="margin-top:10px; text-align:center;">
        <button
          onclick="location.href='${p.detailUrl}'"
          style="
            padding:6px 12px;
            background:#1d6fdc;
            color:#fff;
            border:none;
            border-radius:4px;
            cursor:pointer;"

        >
          屋内展示ブース詳細を見る
        </button>
      </div>
    `;
  }

  return html;
}


L.geoJSON(outdoorBooths, {
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;"> </span>',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      })
    }),
  onEachFeature: (f, l) =>
    l.bindPopup(popupBase(f.properties))
}).addTo(outdoorLayer);

L.geoJSON(indoorBooths,{
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;"> </span>',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      })
    }),
  onEachFeature: (f, l) =>
    l.bindPopup(popupBase(f.properties))

/* =========================================
   6. レイヤ切替（QR前提）
========================================= */

  {

  },
  { collapsed: false }
).addTo(map);

</script>
