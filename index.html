   1. マップ初期化（構内ローカル座標）
========================================= */
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2
});


function fixMapSize() {
  map.invalidateSize();
}

setTimeout(fixMapSize, 0);
setTimeout(fixMapSize, 300);
setTimeout(fixMapSize, 800);

window.addEventListener("orientationchange", () => {
  setTimeout(fixMapSize, 300);
});

const checkedSet = new Set();

function addCheckedItem(p) {
  if (checkedSet.has(p.id)) return;

  checkedSet.add(p.id);

  const ul = document.getElementById("checked-items");
  if (!ul) return;

  const li = document.createElement("li");
  li.setAttribute("data-id", p.id);

  const text = document.createElement("span");
  text.textContent = `${p.id} ${p.name}`;

  const btn = document.createElement("button");
  btn.textContent = "解除";
  btn.className = "remove-btn";

  // ✅ 解除処理
  btn.addEventListener("click", () => {
    checkedSet.delete(p.id);
    li.remove();
  });

  li.appendChild(text);
  li.appendChild(btn);
  ul.appendChild(li);
}
 // ✅ 一括解除処理
document.getElementById("clear-all-btn").addEventListener("click", () => {
  checkedSet.clear();
  const ul = document.getElementById("checked-items");
  while (ul.firstChild) {
    ul.removeChild(ul.firstChild);
  }
});

/* =========================================
   5. 描画処理
========================================= */

function popupBase(p) {
  let html = `
    <div style="
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    ">
      ${p.id} ${p.name}
    </div>
    概要：${p.detail}
  `;


  // 実演時間（あれば表示）
  if (p.time) {
    html += `
<div style="margin-top:4px;">
実演時間：${p.time}
</div>`;
  }

  // 画像がある場合のみ表示
  if (p.image) {
    html += `
      <img src="${p.image}"
           style="width:100%; margin-top:6px; border-radius:6px;">`;
  }

  return html;
}




function showBlinkMarkerById(id) {

  highlightLayer.clearLayers();

  outdoorBooths.features.forEach(function(f){

    if (String(f.properties.id) === String(id)) {

      const coord = f.geometry.coordinates;

      const marker = L.marker(
        [coord[1], coord[0]],
        {
          icon: L.divIcon({
            className: "",
            html: '<div class="blink-dot"></div>',
            iconSize: [20,20],
            iconAnchor: [10,10]
          })
        }
      );

      highlightLayer.addLayer(marker);

      // ★5秒後に消える
    setTimeout(() => {
      marker.remove();  // ← こっちの方が安定
    }, 5000);


    }

  });

}


 
L.geoJSON(outdoorBooths, {
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;"> </span>',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      })
    }),
  onEachFeature: (f, l) =>
    l.bindPopup(popupBase(f.properties))
}).addTo(outdoorLayer);


L.geoJSON(indoorBooths,{
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;"> </span>',
        iconSize: [300, 20],
        iconAnchor: [18, 18]
      })
    }),

 onEachFeature: (f, l) => {
    l.on("click", () => {
      showBlinkMarkerById(f.properties.id);
      addCheckedItem(f.properties);
    });
  }

}).addTo(indoorLayer);
